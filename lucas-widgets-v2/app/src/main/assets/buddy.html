<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#031015;font-family:-apple-system,system-ui,sans-serif}
.slider{display:flex;width:400%;height:100%;transition:transform .35s cubic-bezier(.25,.1,.25,1);will-change:transform}
.slide{width:25%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:32px 20px 20px;flex-shrink:0}
.hdr{display:flex;justify-content:space-between;align-items:center}
.title{color:rgba(0,229,255,.85);font-size:12px;font-weight:700;letter-spacing:1.5px}
.chip{background:rgba(0,229,255,.12);color:#00e5ff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:8px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#00e5ff;box-shadow:0 0 6px #00e5ff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.big{font-family:monospace;font-size:64px;font-weight:300;color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,.5);letter-spacing:-2px;line-height:1}
.sub{font-size:13px;color:rgba(255,255,255,.65);font-family:monospace;text-align:center}
.ft{font-size:10px;color:rgba(255,255,255,.3);text-align:center;font-family:monospace}
.nav{display:flex;justify-content:space-between;align-items:center;padding:0 8px;margin-bottom:6px}
.dots{display:flex;gap:10px;justify-content:center}
.dots span{width:10px;height:10px;border-radius:50%;background:rgba(0,229,255,.25);cursor:pointer;transition:all .2s}
.dots span.active{background:#00e5ff;box-shadow:0 0 6px #00e5ff;transform:scale(1.2)}
.arrow{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,229,255,.1);color:#00e5ff;font-size:18px;cursor:pointer;border:1px solid rgba(0,229,255,.3)}
.arrow:active{background:rgba(0,229,255,.25)}
.close-x{position:fixed;top:12px;right:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;z-index:100;border:1px solid rgba(255,255,255,.2)}

.wv{display:flex;gap:4px;height:28px;align-items:center}
.wv span{width:4px;background:#00e5ff;border-radius:2px;box-shadow:0 0 4px #00e5ff;animation:wave 1s ease-in-out infinite}
.wv span:nth-child(1){animation-delay:0s;height:8px}.wv span:nth-child(2){animation-delay:.1s;height:16px}.wv span:nth-child(3){animation-delay:.2s;height:24px}.wv span:nth-child(4){animation-delay:.3s;height:18px}.wv span:nth-child(5){animation-delay:.4s;height:28px}.wv span:nth-child(6){animation-delay:.5s;height:12px}.wv span:nth-child(7){animation-delay:.6s;height:22px}.wv span:nth-child(8){animation-delay:.7s;height:10px}.wv span:nth-child(9){animation-delay:.8s;height:20px}
@keyframes wave{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1.2);opacity:1}}

.typg{display:flex;gap:8px;align-items:center}
.typg span{width:8px;height:8px;border-radius:50%;background:#00e5ff;box-shadow:0 0 6px #00e5ff;animation:typg 1.2s infinite}
.typg span:nth-child(2){animation-delay:.2s}.typg span:nth-child(3){animation-delay:.4s}
@keyframes typg{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-6px)}}
.chat-bubble{background:rgba(0,229,255,.08);border-radius:12px;padding:14px 16px;width:85%}
.chat-label{font-size:10px;color:rgba(0,229,255,.7);font-weight:700;margin-bottom:6px}
.chat-text{font-size:12px;color:rgba(255,255,255,.8);font-family:monospace;line-height:1.5}

.orb-w{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#00e5ff 0%,rgba(0,229,255,.3) 50%,transparent 100%);animation:orbP 2s ease-in-out infinite}
.orb-r{position:absolute;width:90px;height:90px;border:1.5px solid rgba(0,229,255,.4);border-radius:50%;animation:orbR 2s ease-out infinite}
.orb-r:nth-child(3){animation-delay:.7s;width:110px;height:110px}
@keyframes orbP{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
@keyframes orbR{0%{transform:scale(.7);opacity:1}100%{transform:scale(1.4);opacity:0}}
.listen-text{font-size:16px;color:#00e5ff;font-weight:700;letter-spacing:3px;margin-top:8px}

.spark{display:flex;gap:3px;height:40px;align-items:flex-end}
.spark span{width:6px;background:linear-gradient(to top,rgba(0,229,255,.3),#00e5ff);border-radius:2px}
.stats-row{display:flex;gap:24px;margin-bottom:12px}
.stat{text-align:center}
.stat-val{font-family:monospace;font-size:32px;color:#00e5ff;font-weight:300;text-shadow:0 0 10px rgba(0,229,255,.4)}
.stat-label{font-size:9px;color:rgba(0,229,255,.6);letter-spacing:1px;margin-top:2px}
</style>
</head>
<body>
<div class="close-x" onclick="window.history.back()">×</div>
<div class="slider" id="slider">

<div class="slide">
  <div class="hdr"><span class="title">BUDDY // VOICE</span><span class="chip"><span class="dot"></span>SYNC</span></div>
  <div class="body">
    <div class="big" id="clock">--:--</div>
    <div class="sub">&gt; diga "Buddy..."</div>
    <div class="wv"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="ft" id="ft1">carregando...</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title">BUDDY // EVENTOS</span><span class="chip" id="ev-count">--</span></div>
  <div class="body">
    <div class="chat-bubble">
      <div class="chat-label">Próximo:</div>
      <div class="chat-text" id="next-event">--</div>
    </div>
    <div class="typg"><span></span><span></span><span></span></div>
    <div class="sub" id="next-event-time">--</div>
  </div>
  <div class="ft" id="ft2">eventos sincronizados</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title">BUDDY // LISTEN</span><span class="chip"><span class="dot"></span>ON</span></div>
  <div class="body">
    <div class="orb-w"><div class="orb-r"></div><div class="orb-r"></div><div class="orb"></div></div>
    <div class="listen-text">OUVINDO</div>
    <div class="sub">fale algo...</div>
  </div>
  <div class="ft">wake word ativo</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title">BUDDY // STATS</span><span class="chip">HOJE</span></div>
  <div class="body">
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-events">--</div><div class="stat-label">EVENTOS</div></div>
      <div class="stat"><div class="stat-val" id="stat-todos">--</div><div class="stat-label">TODOS</div></div>
      <div class="stat"><div class="stat-val" id="stat-notes">--</div><div class="stat-label">NOTAS</div></div>
    </div>
    <div class="spark"><span style="height:30%"></span><span style="height:50%"></span><span style="height:40%"></span><span style="height:80%"></span><span style="height:60%"></span><span style="height:90%"></span><span style="height:45%"></span><span style="height:70%"></span><span style="height:100%"></span><span style="height:55%"></span><span style="height:85%"></span><span style="height:35%"></span></div>
    <div class="sub" style="margin-top:8px" id="updated-at">atualizado --</div>
  </div>
  <div class="ft">atualiza 5min</div>
</div>

</div>

<div class="nav">
  <div class="arrow" id="prev">‹</div>
  <div class="dots" id="dots">
    <span class="active" data-i="0"></span>
    <span data-i="1"></span>
    <span data-i="2"></span>
    <span data-i="3"></span>
  </div>
  <div class="arrow" id="next">›</div>
</div>

<script>
const slider=document.getElementById('slider');
const dots=document.querySelectorAll('#dots span');
let cur=0;const total=4;

function go(n){
  cur=Math.max(0,Math.min(total-1,n));
  slider.style.transform='translateX(-'+(cur*25)+'%)';
  dots.forEach((d,i)=>d.classList.toggle('active',i===cur));
}

document.getElementById('prev').addEventListener('click',()=>go(cur-1));
document.getElementById('next').addEventListener('click',()=>go(cur+1));
dots.forEach(d=>d.addEventListener('click',()=>go(parseInt(d.dataset.i))));

let sx=0,dx=0,active=false;
slider.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;active=true;},{passive:true});
slider.addEventListener('touchmove',e=>{if(active)dx=e.touches[0].clientX-sx;},{passive:true});
slider.addEventListener('touchend',()=>{if(!active)return;active=false;if(Math.abs(dx)>50){go(dx<0?cur+1:cur-1);}});

function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
updateClock();setInterval(updateClock,10000);

function fmtDate(s){if(!s)return '--';const [y,m,d]=s.split('-');return d+'/'+m;}
function fmtRel(ts){if(!ts)return '--';const m=Math.floor((Date.now()-ts)/60000);if(m<1)return 'agora';if(m<60)return m+'min atrás';return Math.floor(m/60)+'h atrás';}

async function loadData(){
  try{
    const r=await fetch('https://polished-shape-8cbf.luquinha13579.workers.dev/api/widget?app=buddy',{cache:'no-store'});
    const d=await r.json();
    localStorage.setItem('buddy-data',JSON.stringify(d));
    render(d);
  }catch(e){
    const cache=localStorage.getItem('buddy-data');
    if(cache)render(JSON.parse(cache));
    else document.getElementById('ft1').textContent='offline';
  }
}

function render(d){
  if(d.summary){
    document.getElementById('ev-count').textContent=d.summary.events||0;
    document.getElementById('stat-events').textContent=d.summary.events||0;
    document.getElementById('stat-todos').textContent=d.summary.todos||0;
    document.getElementById('stat-notes').textContent=d.summary.notes||0;
  }
  if(d.next_event){
    document.getElementById('next-event').textContent=d.next_event.title||'--';
    document.getElementById('next-event-time').textContent=fmtDate(d.next_event.date)+' às '+(d.next_event.time||'--');
  }else{
    document.getElementById('next-event').textContent='Nenhum evento';
    document.getElementById('next-event-time').textContent='--';
  }
  document.getElementById('updated-at').textContent='atualizado '+fmtRel(d.updatedAt);
  document.getElementById('ft1').textContent='conectado';
  document.getElementById('ft2').textContent=(d.summary&&d.summary.events?d.summary.events:0)+' evento(s) total';
}

loadData();setInterval(loadData,30000);
</script>
</body></html>
