<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#050818;font-family:-apple-system,system-ui,sans-serif}
.slider{display:flex;width:400%;height:100%;transition:transform .35s cubic-bezier(.25,.1,.25,1);will-change:transform}
.slide{width:25%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:32px 20px 20px;flex-shrink:0}
.hdr{display:flex;justify-content:space-between;align-items:center}
.title{color:rgba(0,168,255,.85);font-size:12px;font-weight:700;letter-spacing:1.5px}
.chip{background:rgba(0,168,255,.14);color:#4ab7ff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:8px}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.big{font-family:monospace;font-size:56px;font-weight:300;color:#4ab7ff;text-shadow:0 0 16px rgba(0,168,255,.5);letter-spacing:-2px;line-height:1}
.sub{font-size:13px;color:rgba(255,255,255,.65);font-family:monospace;text-align:center}
.ft{font-size:10px;color:rgba(255,255,255,.3);text-align:center;font-family:monospace}
.nav{display:flex;justify-content:space-between;align-items:center;padding:0 8px;margin-bottom:6px}
.dots{display:flex;gap:10px;justify-content:center}
.dots span{width:10px;height:10px;border-radius:50%;background:rgba(0,168,255,.25);cursor:pointer;transition:all .2s}
.dots span.active{background:#4ab7ff;box-shadow:0 0 6px #4ab7ff;transform:scale(1.2)}
.arrow{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,168,255,.1);color:#4ab7ff;font-size:18px;cursor:pointer;border:1px solid rgba(0,168,255,.3)}
.arrow:active{background:rgba(0,168,255,.25)}
.close-x{position:fixed;top:12px;right:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;z-index:100;border:1px solid rgba(255,255,255,.2)}

.spec{display:flex;gap:3px;height:36px;align-items:flex-end}
.spec span{width:5px;background:linear-gradient(to top,#00a8ff,#a855f7);border-radius:2px;animation:spec .8s ease-in-out infinite}
.spec span:nth-child(odd){animation-delay:.15s}
.spec span:nth-child(1){height:30%}.spec span:nth-child(2){height:60%}.spec span:nth-child(3){height:45%}.spec span:nth-child(4){height:80%}.spec span:nth-child(5){height:95%}.spec span:nth-child(6){height:70%}.spec span:nth-child(7){height:100%}.spec span:nth-child(8){height:55%}.spec span:nth-child(9){height:85%}.spec span:nth-child(10){height:40%}.spec span:nth-child(11){height:75%}.spec span:nth-child(12){height:50%}
@keyframes spec{0%,100%{transform:scaleY(.3);opacity:.6}50%{transform:scaleY(1);opacity:1}}

.metro{position:relative;width:80px;height:60px;display:flex;justify-content:center;align-items:flex-end}
.arm{width:3px;height:50px;background:linear-gradient(to bottom,transparent,#a855f7 30%,#a855f7);transform-origin:bottom center;animation:swing .5s ease-in-out infinite alternate;border-radius:2px}
.weight{width:10px;height:10px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px #a855f7;position:absolute;top:6px;left:50%;margin-left:-5px;transform-origin:50% 48px;animation:swing .5s ease-in-out infinite alternate}
.led{position:absolute;right:4px;top:6px;width:8px;height:8px;border-radius:50%;background:#ff00aa;box-shadow:0 0 8px #ff00aa;animation:beat .5s ease-in-out infinite}
@keyframes swing{from{transform:rotate(-20deg)}to{transform:rotate(20deg)}}
@keyframes beat{0%,45%,55%,100%{opacity:.2}50%{opacity:1}}
.bpm-text{font-family:monospace;font-size:56px;color:#a855f7;font-weight:300;text-shadow:0 0 14px rgba(168,85,247,.5)}

.np-title{font-size:18px;color:rgba(255,255,255,.9);font-weight:700;text-align:center;line-height:1.4}
.prog{width:80%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,#ffd700,#ffa500);border-radius:2px;animation:pfill 4s ease-out infinite}
@keyframes pfill{0%{width:0}70%,100%{width:62%}}

.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:80%}
.hm span{aspect-ratio:1;border-radius:3px;background:rgba(0,200,180,.1)}
.hm .h1{background:rgba(0,200,180,.3)}.hm .h2{background:rgba(0,200,180,.6)}.hm .h3{background:#00c8b4;box-shadow:0 0 4px #00c8b4}
.rep-big{font-family:monospace;font-size:48px;color:#00c8b4;font-weight:300;text-shadow:0 0 12px rgba(0,200,180,.4)}
</style>
</head>
<body>
<div class="close-x" onclick="window.history.back()">&#215;</div>
<div class="slider" id="slider">

<div class="slide">
  <div class="hdr"><span class="title">PALCO // SHOW</span><span class="chip" id="show-chip">--</span></div>
  <div class="body">
    <div class="big" id="show-date">--/--</div>
    <div class="sub" id="show-info">carregando...</div>
    <div class="spec"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="ft" id="ft1">sincronizando...</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title">PALCO // BPM</span><span class="chip" style="background:rgba(168,85,247,.15);color:#c084fc">ROCK</span></div>
  <div class="body">
    <div class="bpm-text">120</div>
    <div class="sub">BPM</div>
    <div class="metro"><div class="arm"></div><div class="weight"></div><div class="led"></div></div>
  </div>
  <div class="ft">4/4 - compasso 1</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title" style="color:rgba(255,215,0,.85)">PALCO // ENSAIO</span><span class="chip" style="background:rgba(255,215,0,.14);color:#ffd700" id="ens-chip">--</span></div>
  <div class="body">
    <div class="np-title" id="ens-title">--</div>
    <div class="sub" id="ens-date">--</div>
    <div class="prog"><div class="prog-f"></div></div>
  </div>
  <div class="ft" id="ft3">proximo ensaio</div>
</div>

<div class="slide">
  <div class="hdr"><span class="title" style="color:rgba(0,200,180,.85)">PALCO // REPERTORIO</span><span class="chip" style="background:rgba(0,200,180,.14);color:#00c8b4" id="rep-chip">--</span></div>
  <div class="body">
    <div class="rep-big" id="rep-count">--</div>
    <div class="sub">ensaios no mes</div>
    <div class="hm">
      <span></span><span></span><span class="h1"></span><span></span><span></span><span class="h2"></span><span class="h3"></span>
      <span class="h1"></span><span></span><span></span><span class="h2"></span><span></span><span class="h1"></span><span class="h3"></span>
      <span></span><span class="h1"></span><span></span><span class="h2"></span><span class="h3"></span><span></span><span></span>
    </div>
  </div>
  <div class="ft" id="ft4">repertorio</div>
</div>

</div>

<div class="nav">
  <div class="arrow" id="prev">&#8249;</div>
  <div class="dots" id="dots">
    <span class="active" data-i="0"></span>
    <span data-i="1"></span>
    <span data-i="2"></span>
    <span data-i="3"></span>
  </div>
  <div class="arrow" id="next">&#8250;</div>
</div>

<script>
const slider=document.getElementById('slider');
const dots=document.querySelectorAll('#dots span');
let cur=0;const total=4;

function go(n){
  cur=Math.max(0,Math.min(total-1,n));
  slider.style.transform='translateX(-'+(cur*25)+'%)';
  dots.forEach((d,i)=>d.classList.toggle('active',i===cur));
}

document.getElementById('prev').addEventListener('click',()=>go(cur-1));
document.getElementById('next').addEventListener('click',()=>go(cur+1));
dots.forEach(d=>d.addEventListener('click',()=>go(parseInt(d.dataset.i))));

let sx=0,dx=0,active=false;
slider.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;active=true;},{passive:true});
slider.addEventListener('touchmove',e=>{if(active)dx=e.touches[0].clientX-sx;},{passive:true});
slider.addEventListener('touchend',()=>{if(!active)return;active=false;if(Math.abs(dx)>50){go(dx<0?cur+1:cur-1);}});

function fmtDate(s){if(!s)return '--/--';const [y,m,d]=s.split('-');return d+'/'+m;}
function diasAte(s){if(!s)return '--';const diff=Math.ceil((new Date(s+'T00:00')-new Date().setHours(0,0,0,0))/86400000);if(diff<0)return 'passado';if(diff===0)return 'HOJE';if(diff===1)return 'amanha';return diff+' dias';}

async function loadData(){
  try{
    const r=await fetch('https://polished-shape-8cbf.luquinha13579.workers.dev/api/widget?app=palco',{cache:'no-store'});
    const d=await r.json();
    localStorage.setItem('palco-data',JSON.stringify(d));
    render(d);
  }catch(e){
    const cache=localStorage.getItem('palco-data');
    if(cache)render(JSON.parse(cache));
    else document.getElementById('ft1').textContent='offline';
  }
}

function render(d){
  if(d.next_show){
    document.getElementById('show-date').textContent=fmtDate(d.next_show.date);
    document.getElementById('show-info').textContent=(d.next_show.title||'Show')+' - '+(d.next_show.time||'');
    document.getElementById('show-chip').textContent=diasAte(d.next_show.date);
  }else if(d.next_rehearsal){
    document.getElementById('show-date').textContent=fmtDate(d.next_rehearsal.date);
    document.getElementById('show-info').textContent=d.next_rehearsal.title||'Ensaio';
    document.getElementById('show-chip').textContent=diasAte(d.next_rehearsal.date);
  }else{
    document.getElementById('show-date').textContent='--';
    document.getElementById('show-info').textContent='Nenhum show agendado';
    document.getElementById('show-chip').textContent='--';
  }

  if(d.next_rehearsal){
    document.getElementById('ens-title').textContent=d.next_rehearsal.title||'Ensaio';
    document.getElementById('ens-date').textContent=fmtDate(d.next_rehearsal.date)+' as '+(d.next_rehearsal.time||'--');
    document.getElementById('ens-chip').textContent=diasAte(d.next_rehearsal.date);
  }

  if(d.summary){
    document.getElementById('rep-count').textContent=d.summary.rehearsals||0;
    document.getElementById('rep-chip').textContent=(d.summary.songs||0)+' mus';
    document.getElementById('ft4').textContent=(d.summary.shows||0)+' show(s) agendado(s)';
  }
  document.getElementById('ft1').textContent='conectado';
}

loadData();setInterval(loadData,30000);
</script>
</body></html>
