<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#050818;font-family:-apple-system,system-ui,sans-serif;touch-action:pan-x}
.slider{display:flex;width:400%;height:100%;transition:transform .3s ease}
.slide{width:25%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:24px 20px 16px}
.hdr{display:flex;justify-content:space-between;align-items:center}
.title{color:rgba(0,168,255,.85);font-size:12px;font-weight:700;letter-spacing:1.5px}
.chip{background:rgba(0,168,255,.14);color:#4ab7ff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:8px}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.big{font-family:monospace;font-size:64px;font-weight:300;color:#4ab7ff;text-shadow:0 0 16px rgba(0,168,255,.5);letter-spacing:-2px}
.sub{font-size:13px;color:rgba(255,255,255,.65);font-family:monospace}
.ft{font-size:10px;color:rgba(255,255,255,.3);text-align:center;font-family:monospace}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.dots span{width:8px;height:8px;border-radius:50%;background:rgba(0,168,255,.25)}
.dots span.active{background:#4ab7ff;box-shadow:0 0 6px #4ab7ff}

/* Slide 1: VU spectrum */
.spec{display:flex;gap:3px;height:36px;align-items:flex-end}
.spec span{width:5px;background:linear-gradient(to top,#00a8ff,#a855f7);border-radius:2px;animation:spec .8s ease-in-out infinite}
.spec span:nth-child(odd){animation-delay:.15s}
.spec span:nth-child(1){height:30%}.spec span:nth-child(2){height:60%}.spec span:nth-child(3){height:45%}.spec span:nth-child(4){height:80%}.spec span:nth-child(5){height:95%}.spec span:nth-child(6){height:70%}.spec span:nth-child(7){height:100%}.spec span:nth-child(8){height:55%}.spec span:nth-child(9){height:85%}.spec span:nth-child(10){height:40%}.spec span:nth-child(11){height:75%}.spec span:nth-child(12){height:50%}.spec span:nth-child(13){height:90%}.spec span:nth-child(14){height:35%}.spec span:nth-child(15){height:65%}
@keyframes spec{0%,100%{transform:scaleY(.3);opacity:.6}50%{transform:scaleY(1);opacity:1}}

/* Slide 2: Metronome */
.metro{position:relative;width:80px;height:60px;display:flex;justify-content:center;align-items:flex-end}
.arm{width:3px;height:50px;background:linear-gradient(to bottom,transparent,#a855f7 30%,#a855f7);transform-origin:bottom center;animation:swing .5s ease-in-out infinite alternate;border-radius:2px}
.weight{width:10px;height:10px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px #a855f7;position:absolute;top:6px;left:50%;margin-left:-5px;transform-origin:50% 48px;animation:swing .5s ease-in-out infinite alternate}
.led{position:absolute;right:4px;top:6px;width:8px;height:8px;border-radius:50%;background:#ff00aa;box-shadow:0 0 8px #ff00aa;animation:beat .5s ease-in-out infinite}
@keyframes swing{from{transform:rotate(-20deg)}to{transform:rotate(20deg)}}
@keyframes beat{0%,45%,55%,100%{opacity:.2}50%{opacity:1}}
.bpm-text{font-family:monospace;font-size:56px;color:#a855f7;font-weight:300;text-shadow:0 0 14px rgba(168,85,247,.5)}

/* Slide 3: Now Playing */
.np-title{font-size:18px;color:rgba(255,255,255,.9);font-weight:700;text-align:center;line-height:1.4}
.prog{width:80%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,#ffd700,#ffa500);border-radius:2px;animation:pfill 4s ease-out infinite}
@keyframes pfill{0%{width:0}70%,100%{width:62%}}
.adot{display:flex;gap:5px;justify-content:center}
.adot span{width:4px;height:4px;border-radius:50%;background:#ffd700;animation:adot 1.2s infinite}
.adot span:nth-child(2){animation-delay:.15s}.adot span:nth-child(3){animation-delay:.3s}.adot span:nth-child(4){animation-delay:.45s}.adot span:nth-child(5){animation-delay:.6s}
@keyframes adot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* Slide 4: Ensaios heatmap */
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:80%}
.hm span{aspect-ratio:1;border-radius:3px;background:rgba(0,200,180,.1)}
.hm .h1{background:rgba(0,200,180,.3)}.hm .h2{background:rgba(0,200,180,.6)}.hm .h3{background:#00c8b4;box-shadow:0 0 4px #00c8b4}
.rep-big{font-family:monospace;font-size:48px;color:#00c8b4;font-weight:300;text-shadow:0 0 12px rgba(0,200,180,.4)}
</style>
</head>
<body>
<div class="slider" id="slider">

<!-- Slide 1: SHOW -->
<div class="slide">
  <div class="hdr"><span class="title">PALCO // SHOW</span><span class="chip">6 DIAS</span></div>
  <div class="body">
    <div class="big">18/05</div>
    <div class="sub">Garagem 66 - Sab - 21h</div>
    <div class="spec"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="dots"><span class="active"></span><span></span><span></span><span></span></div>
  <div class="ft">14 musicas - Bohemian no top</div>
</div>

<!-- Slide 2: METRONOMO -->
<div class="slide">
  <div class="hdr"><span class="title">PALCO // BPM</span><span class="chip" style="background:rgba(168,85,247,.15);color:#c084fc">ROCK</span></div>
  <div class="body">
    <div class="bpm-text">120</div>
    <div class="sub">BPM</div>
    <div class="metro"><div class="arm"></div><div class="weight"></div><div class="led"></div></div>
  </div>
  <div class="dots"><span></span><span class="active"></span><span></span><span></span></div>
  <div class="ft">4/4 - compasso 1</div>
</div>

<!-- Slide 3: NOW PLAYING -->
<div class="slide">
  <div class="hdr"><span class="title" style="color:rgba(255,215,0,.85)">PALCO // LIVE</span><span class="chip" style="background:rgba(255,215,0,.14);color:#ffd700">AO VIVO</span></div>
  <div class="body">
    <div class="np-title">Bohemian<br>Rhapsody</div>
    <div class="sub">3:24 / 5:55</div>
    <div class="prog"><div class="prog-f"></div></div>
    <div class="adot"><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <div class="dots"><span></span><span></span><span class="active"></span><span></span></div>
  <div class="ft">prox: Sweet Child O Mine</div>
</div>

<!-- Slide 4: ENSAIOS -->
<div class="slide">
  <div class="hdr"><span class="title" style="color:rgba(0,200,180,.85)">PALCO // ENSAIO</span><span class="chip" style="background:rgba(0,200,180,.14);color:#00c8b4">12h/mes</span></div>
  <div class="body">
    <div class="rep-big">24</div>
    <div class="sub">musicas no repertorio</div>
    <div class="hm">
      <span></span><span></span><span class="h1"></span><span></span><span></span><span class="h2"></span><span class="h3"></span>
      <span class="h1"></span><span></span><span></span><span class="h2"></span><span></span><span class="h1"></span><span class="h3"></span>
      <span></span><span class="h1"></span><span></span><span class="h2"></span><span class="h3"></span><span></span><span></span>
    </div>
    <div class="sub" style="margin-top:6px">ultimos 21 dias</div>
  </div>
  <div class="dots"><span></span><span></span><span></span><span class="active"></span></div>
  <div class="ft">seg qua sex - 3 membros</div>
</div>

</div>
<script>
const slider=document.getElementById('slider');let cur=0;const total=4;
function go(n){cur=Math.max(0,Math.min(total-1,n));slider.style.transform='translateX(-'+(cur*25)+'%)';}
let sx=0,dx=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;});
document.addEventListener('touchmove',e=>{dx=e.touches[0].clientX-sx;});
document.addEventListener('touchend',()=>{if(Math.abs(dx)>40){dx<0?go(cur+1):go(cur-1);}});
<\/script>
</body></html>
